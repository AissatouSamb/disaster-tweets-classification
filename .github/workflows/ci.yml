name: CI - Tests & Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    name: Run unit tests
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandas scikit-learn numpy
      
      - name: Run pytest
        run: |
          pytest tests/ -v --tb=short
      
      - name: Test summary
        if: always()
        run: echo "Tests completed for commit ${{ github.sha }}"
  
  lint:
    runs-on: ubuntu-latest
    name: Code quality check
    needs: test
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Install flake8
        run: pip install flake8
      
      - name: Run flake8 (errors only)
        run: |
          flake8 dashboard/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics